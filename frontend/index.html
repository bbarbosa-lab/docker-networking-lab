<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Lab - Secure Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐App de Teste🔐  </h1>
            <h1>Dockers Networking</h1>
            <p>Criada por Bruno Barbosa</p>
        </div>d

        <div class="tabs">
            <button class="tab-button active" onclick="showTab('login')">Login</button>
            <button class="tab-button" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="login" class="tab-content active">
            <h2>Login to your account</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <div id="loginMessage" class="message"></div>
        </div>

        <!-- Register Form -->
        <div id="register" class="tab-content">
            <h2>Create a new account</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input type="text" id="registerUsername" required minlength="3">
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" required minlength="6">
                </div>
                <button type="submit" class="btn">Create Account</button>
            </form>
            <div id="registerMessage" class="message"></div>
        </div>

        <div class="footer">
            <p>Passwords are securely hashed • Data stored in MySQL</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
